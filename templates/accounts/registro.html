<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro &mdash; Conect&aacute;te</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;background:#0d0d14;display:flex;align-items:center;justify-content:center;padding:2rem;-webkit-font-smoothing:antialiased}
.box{background:#f5f4fc;border-radius:20px;padding:2.5rem;width:100%;max-width:460px}
.brand{display:flex;align-items:center;gap:.75rem;margin-bottom:2rem}
.brand-logo{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#7c6eff,#ff6b9d);display:flex;align-items:center;justify-content:center;font-size:1.1rem;box-shadow:0 4px 12px rgba(124,110,255,.3)}
.brand-name{font-family:'Syne',sans-serif;font-size:1.1rem;color:#0d0d14}
h2{font-family:'Syne',sans-serif;font-size:1.5rem;color:#0d0d14;letter-spacing:-.5px;margin-bottom:.35rem}
.sub{font-size:.85rem;color:#8884a8;margin-bottom:1.75rem}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.field{margin-bottom:.85rem}
.field.full{grid-column:1/-1}
label{display:block;font-size:.8rem;font-weight:600;color:#1c1c2e;margin-bottom:.35rem}
input{width:100%;padding:.65rem .9rem;border:1.5px solid #e4e2f5;border-radius:11px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.87rem;color:#0d0d14;background:#fff;outline:none;transition:border .18s,box-shadow .18s}
input:focus{border-color:#7c6eff;box-shadow:0 0 0 3px rgba(124,110,255,.12)}
.btn{width:100%;padding:.75rem;background:linear-gradient(135deg,#7c6eff,#ff6b9d);color:#fff;border:none;border-radius:11px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(124,110,255,.3);transition:all .2s;margin-top:.5rem}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(124,110,255,.4)}
.link{text-align:center;font-size:.82rem;color:#8884a8;margin-top:1.25rem}
.link a{color:#7c6eff;font-weight:600;text-decoration:none}
</style>

  <h2>Crea tu cuenta</h2>
  <div class="sub">Empieza tu camino de bienestar emocional</div>
  <form method="post">
    {% csrf_token %}
    <div class="grid">
      <div class="field"><label>Nombres *</label><input type="text" name="first_name" placeholder="Juan" required></div>
